<!DOCTYPE html>
<html lang="pt-BR">
<head>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<section class="hero">

    <!-- VÍDEO FUNDO -->
    <video autoplay muted loop playsinline class="video-bg">

    <div class="overlay"></div>

    <div class="container">

        <!-- FOTO -->
        <div class="foto-box">
            <img src="FOTOCAPA.jpg" alt="Maria Amélia" class="foto">
        </div>

        <!-- LOGO -->
        <img src="LOGO.png" alt="Maria Amélia" class="logo">

        <!-- TEXTO -->
        <p class="bio">
            🏛️ Vice-presidente do PL Mulher DF <br>
            Pré-candidata a Deputada Federal <br>
            Política, família e compromisso com Brasília 💚
        </p>

        <!-- LINKS -->
        <div class="links">

            <!-- 🔥 BOTÃO PRINCIPAL (NOVO) -->
            <a href="https://maria-amelia.xyz/cadastro/8BFA5A71" target="_blank" class="botao destaque">
                <span class="icone">📲</span>
                <span class="texto">Fique por dentro da nossa campanha</span>
            </a>

            <a href="https://instagram.com/mariaamelia.df" target="_blank" rel="noopener noreferrer">
                📸 Instagram
            </a>

            <a href="https://wa.me/5561920033480" target="_blank" rel="noopener noreferrer">
                💬 WhatsApp
            </a>

            <a href="https://x.com/mariaameliadf" target="_blank" rel="noopener noreferrer" class="link-x">
                X
            </a>

            <a href="https://www.facebook.com/mariaamelia.df.oficial/" target="_blank" rel="noopener noreferrer" class="link-facebook">
                ⓕ Facebook
            </a>

            <a href="https://www.metropoles.com/brasil/confeiteira-de-michelle-confirma-pre-candidatura-a-deputada-federal" target="_blank" rel="noopener noreferrer">
                🇧🇷 Política
            </a>

        </div>

        <!-- FORMULÁRIO -->
        <form class="opiniao">

            <h2 class="titulo-formulario">
                💚 Junte-se comigo, quero te ouvir
            </h2>

            <input type="text" name="nome" placeholder="Seu nome">

            <input type="tel" name="telefone" placeholder="Seu telefone">

            <input type="email" name="email" placeholder="Seu e-mail">

            <textarea name="mensagem" placeholder="Escreva sua mensagem..."></textarea>

            <button type="submit">💚 Enviar</button>

        </form>

    </div>

</section>
